<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Navbar Practice</title>
  </head>
  <style>
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
      padding: 10px 30px;
      box-sizing: border-box;
      background-color: #0f172a;
      color: white;
    }
    .menu {
  display: flex;
  gap: 20px;
}

.menu span {
  cursor: pointer;
}
  </style>
  <body>
    <div class="navbar">
      <div class="logo">Logo</div>

      <div class="menu">
        <span>Home</span>
        <span>About</span>
        <span>Contact</span>
      </div>
    </div>
  </body>
</html>

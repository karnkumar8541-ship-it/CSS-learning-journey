<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Day 2 Layout</title>
  </head>
  <style>
    .main {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 200px;
      background-color:white;
      padding: 10px;
    }
    .content {
      flex-grow: 1;
      background-color: orange;
      padding: 10px;
    }
  </style>
  <body>
    <div class="main">
      <div class="sidebar">Sidebar</div>
      <div class="content">Content</div>
    </div>
  </body>
</html>
